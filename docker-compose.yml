version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - app-network

  webapp:
    build: .
    container_name: taskmanager-webapp
    ports:
      - "80:3000"
    environment:
      - MONGO_URI=mongodb://mongodb:27017/taskmanager
    depends_on:
      - mongodb
    networks:
      - app-network

volumes:
  mongo-data:

networks:
  app-network:
    driver: bridge
